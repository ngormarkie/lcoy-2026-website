<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LCOY Sierra Leone 2026 — Inclusive Climate Action</title>
<link rel="icon" type="image/png" href="/photos/Logos for host organizations/LCOY-YOUNGO-Endored.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@1,400;1,700&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
<div id="splash" style="position:fixed;inset:0;z-index:9999;background:#0B2233;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease">
  <div style="position:relative;width:80vmin;height:80vmin;display:flex;align-items:center;justify-content:center;max-width:500px;max-height:500px">
    <div class="splash-ring"></div>
    <div class="splash-ring splash-ring-2"></div>
    <img src="/photos/LCOY-2026-Logo.png" alt="LCOY" class="splash-logo" />
  </div>
  <div class="splash-text">LCOY Sierra Leone 2026</div>
  <div class="splash-sub">Freetown · 7–9 October 2026</div>
  <div class="splash-dots"><span></span><span></span><span></span></div>
</div>
<style>
.splash-logo{width:55%;border-radius:20px;animation:splashZoom 2s ease-in-out infinite;position:relative;z-index:2}
.splash-ring{position:absolute;inset:0;border-radius:50%;border:3px solid transparent;border-top-color:#0072C6;animation:splashSpin 1.2s linear infinite}
.splash-ring-2{border-top-color:#FE9A02;animation-duration:1.8s;animation-direction:reverse;inset:8%}
.splash-text{margin-top:28px;font-family:Outfit,sans-serif;color:#fff;font-size:1.4rem;font-weight:700;letter-spacing:.08em;animation:splashFadeIn 1s ease both}
.splash-dots{display:flex;gap:8px;margin-top:16px}
.splash-dots span{width:10px;height:10px;border-radius:50%;background:var(--orange,#FE9A02);animation:splashBounce 1.4s ease-in-out infinite}
.splash-dots span:nth-child(2){animation-delay:.2s}
.splash-dots span:nth-child(3){animation-delay:.4s}
@keyframes splashZoom{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes splashSpin{to{transform:rotate(360deg)}}
@keyframes splashFadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.splash-sub{font-family:Outfit,sans-serif;color:rgba(255,255,255,.5);font-size:1rem;font-weight:500;letter-spacing:.06em;margin-top:6px;animation:splashFadeIn 1.2s ease .3s both}
@keyframes splashBounce{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-10px);opacity:1}}
</style>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
